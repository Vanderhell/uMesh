name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether v1.5.0 already exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.5.0 >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.release.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = 'v1.5.0';
            const { owner, repo } = context.repo;
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.info(`Release ${tag} already exists.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: 'uMesh v1.5.0',
                body: 'Verified release of uMesh v1.5.0. Changes are limited to the locally verified implementation, CI, and release-prep work in this repository.',
                draft: false,
                prerelease: false,
              });
            }
