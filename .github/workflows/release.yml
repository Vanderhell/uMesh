name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether v1.5.0 already exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.5.0 >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v1.5.0 \
            --verify-tag \
            --title "uMesh v1.5.0" \
            --notes "Verified release of uMesh v1.5.0. Changes are limited to the locally verified implementation, CI, and release-prep work in this repository."
